<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
        integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous">
    <!-- map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
        integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
        crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
        integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
        crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.25.0/axios.min.js"
        integrity="sha512-/Q6t3CASm04EliI1QyIDAA/nDo9R8FQ/BULoUFyN4n/BDdyIxeH7u++Z+eobdmr11gG5D/6nPFyDlnisDwhpYA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <title>document</title>

    <style>
        .container-fluid>.row {
            height: 100vh;
        }

        #map {
            height: 100%;
        }
        table{
            border: 2px solid grey;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row py-3">
            <div class="col-6">
                <div id="map"></div>
            </div>
            <div class="col-6">
                <div class="row">
                    <div class="form-group col-6">
                        <label for="district">зёЈеё‚</label>
                        <select class="form-control" id="district">
                            <!-- option -->
                        </select>
                    </div>
                </div>
                <div class="row">
                    <h2 class="w-100 text-center"><strong></strong>й¤ђе»іиі‡иЁЉ</h2>
                    <div class="col-12">
                        <table class="table table-bordered table-striped text-center">
                            <thead>
                                <tr>
                                    <th>й¤ђиЃЅеђЌзЁ±</th>
                                </tr>
                            </thead>
                            <tbody id="name"></tbody>
                            <thead>
                                <tr>
                                    <th>й›»и©±</th>
                                </tr>
                            </thead>
                            <tbody id="phone"></tbody>
                            <thead>
                                <tr>
                                    <th>ењ°еќЂ</th>
                                </tr>
                            </thead>
                            <tbody id="address"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>

        //е®Је‘Љ
        let map

        //е€†еЌЂй¤ђе»іиі‡ж–™
        let restaurantData

        //жЉ“й¤ђе»іиі‡ж–™
        let restaurantDataRequest = axios.get('https://data.epa.gov.tw/api/v1/gis_p_11?limit=1000&api_key=9be7b239-557b-4c10-9775-78cadfc555e9&sort=ImportDate%20desc&format=json')

        let markers = L.markerClusterGroup(); //ењ°ењ–MarkerеЏўй›†зѕ¤зµ„

        //DOM
        const districtSelect = document.querySelector('#district');
        const areaText = document.querySelector('strong')
        const tableBodyName = document.querySelector('#name')
        const tableBodyPhone = document.querySelector('#phone')
        const tableBodyAddress = document.querySelector('#address')

        //window onload
        window.onload = function () {
            setMap()
            // tableBodyName.innerHTML = 'и«‹е…€йЃёж“‡ењ°й»ћ'
            // tableBodyPhone.innerHTML = 'и«‹е…€йЃёж“‡ењ°й»ћ'
            // tableBodyAddress.innerHTML = 'и«‹е…€йЃёж“‡ењ°й»ћ'


            //д»Ґдё‹е®Је‘Љзљ„дє‹д»¶йѓЅи¦Ѓж€ђеЉџпјЊж‰ЌеЏЇд»Ґз№јзєЊйЂІиЎЊпјЊе¤±ж•—е°±и¦ЃйЂІе€°catch
            Promise.all([restaurantDataRequest])
                .then(response => {
                    let restaurantRes = response[0]
                    console.log(restaurantRes)

                    //area
                    restaurantData = restaurantRes.data.records
                    console.log(restaurantData)

                    //е€ќе§‹иЁ­е®љењ°ењ–жЁ™з±¤
                    setMarker()

                    //е€ќе§‹еЏіеЃґзёЈеё‚дё‹ж‹‰йЃёе–®
                    Array.from(['и«‹йЃёж“‡'].concat([...new Set(restaurantData.map(x => (x.County + x.Town)))])).forEach(x => {
                        let option = document.createElement('option')
                        option.innerText = x
                        option.value = x == 'и«‹йЃёж“‡' ? '' : x
                        districtSelect.appendChild(option)

                    })
                })
            districtSelect.onchange = function () {
                if (districtSelect.value != '') {
                    //ењ°ењ–зљ„з„¦й»ћз§»е‹•и‡іи©ІзёЈеё‚
                    let district = restaurantData.find(x => (x.County + x.Town) == districtSelect.value)
                    //console.log(district)
                    map.setView([district.Lat, district.Lng], 12)


                }
            }
        }

        //function
        function setMap() {
            //е€ќе§‹еЊ–ењ°ењ–
            map = L.map('map', {
                //ењ°ењ–дёЂй–‹е§‹ж‰ЂењЁзљ„дё­еїѓй»ћзљ„з¶“з·Їеє¦(з”Ёarray)
                center: [25.03416068163684, 121.56454962636319],
                //ењ°ењ–зљ„зё®ж”ѕзЁ‹еє¦
                zoom: 9
            })
            //иЁ­е®љењ–иі‡
            let osmUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
            //ењ–е±¤
            let osm = new L.TileLayer(osmUrl, { minZoom: 8, maxZoom: 19 })
            map.addLayer(osm)
        }

        function setMarker() {
            if (markers) markers.clearLayers()

            restaurantData.forEach(item => {
                let data = item
                console.log(data)
                let icon = document.createElement('i')
                icon.classList.add('fas', 'fa-utensils')

                let color = data.Name != undefined ? '#F75C2F' : 'black'

                let marker = L.marker([data.Lat, data.Lng])
                //console.log(marker)
                marker.bindPopup(
                    `
                            <h4>${data.County} ${data.Town} зљ„й¤ђе»і</h4>
                            <p style="font-size: 20px;"><i class="fas fa-utensils pe-2" style="color: ${color};"></i>  й¤ђе»і:${data.Name}</p>
                            `
                )
                //з”ЁaddEventListener
                marker.addEventListener('click', function () {
                    areaText.innerText = `${data.County} ${data.Town}`
                    tableBodyName.innerHTML = ''
                    tableBodyPhone.innerHTML = ''
                    tableBodyAddress.innerHTML = ''

                    let nameTr = document.createElement('tr')
                    let phoneTr = document.createElement('tr')
                    let addressTr = document.createElement('tr')

                    let nameTd = document.createElement('td')
                    nameTd.innerText = data.Name
                    let phoneTd = document.createElement('td')
                    phoneTd.innerText = data.Phone
                    let addressTd = document.createElement('td')
                    addressTd.innerText = data.Address

                    nameTr.appendChild(nameTd)
                    phoneTr.appendChild(phoneTd)
                    addressTr.appendChild(addressTd)

                    tableBodyName.appendChild(nameTr)
                    tableBodyPhone.appendChild(phoneTr)
                    tableBodyAddress.appendChild(addressTr)
                })
                markers.addLayer(marker)
            })
            map.addLayer(markers)
        }




    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.25.0/axios.min.js"
        integrity="sha512-/Q6t3CASm04EliI1QyIDAA/nDo9R8FQ/BULoUFyN4n/BDdyIxeH7u++Z+eobdmr11gG5D/6nPFyDlnisDwhpYA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
