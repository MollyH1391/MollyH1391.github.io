<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>終極密碼</title>
    <style>
        .num {
            margin: 10px;
        }
    </style>
</head>

<body>
    <section>
        <div class="container">
            <div class="row">
                <div class="col-12 col-md-6 d-flex justify-content-center">
                    <p> 1~99</p>
                    <button class="game-start btn btn-danger mx-2">開始遊戲</button>
                    <input type="text">
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-md-6 d-flex justify-content-center">
                    <button type="button" class="btn btn-dark num">1</button>
                    <button type="button" class="btn btn-dark num">2</button>
                    <button type="button" class="btn btn-dark num">3</button>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-md-6 d-flex justify-content-center">
                    <button type="button" class="btn btn-dark num">4</button>
                    <button type="button" class="btn btn-dark num">5</button>
                    <button type="button" class="btn btn-dark num">6</button>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-md-6 d-flex justify-content-center">
                    <button type="button" class="btn btn-dark num">7</button>
                    <button type="button" class="btn btn-dark num">8</button>
                    <button type="button" class="btn btn-dark num">9</button>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-md-6 d-flex justify-content-center">
                    <button type="button" class="btn btn-dark num">x</button>
                    <button type="button" class="btn btn-dark num">0</button>
                    <button type="button" class="btn btn-dark num">v</button>
                </div>
            </div>
        </div>
    </section>


    <script>
        let answer //指派0-99的數字
        let min = 1
        let max = 99

        //DOM
        const gameStartBtn = document.querySelector('.game-start')
        const gameGuessInput = document.querySelector('input')
        const gameReport = document.querySelector('p')
        const gameResetBtn = document.querySelector('.reset')
        const gameGuessBtn = document.querySelector('.guess')

        const numberBtns = document.querySelectorAll('.num')

        //window.onload
        window.onload = function () {
            //遊戲開始按鈕
            gameStartBtn.onclick = function () {
                answer = getAnswer()
                console.log(answer)
            }

            //清除按鈕
            gameResetBtn.onclick = function () {
                resetInput()
            }

            //猜按鈕
            gameGuessBtn.onclick = function () {
                guessAnswer()
            }

            //數字按鈕們
            numberBtns.forEach(btn => {
                btn.onclick = function () {
                    gameGuessInput.value += btn.innerText
                }
            })
        }

        //function
        function getAnswer() {
            return Math.floor(Math.random() * (100 - 1) + 1) //integer random
        }

        function resetInput() {
            gameGuessInput.value = ''
        }

        function guessAnswer() {
            let guessNum = parseInt(gameGuessInput.value)
            if (guessNum > answer) {
                min = guessNum
            }
            else if (guessNum > answer) {
                max = guessNum
            }
            else {
                alert('Boom')
                gameReport.innerText = `${min} ~ ${max}`
            }
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
