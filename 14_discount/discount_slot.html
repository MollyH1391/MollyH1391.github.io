        //宣告startBtn.onclick會用的到全域變數

        //DOM
        let title = document.querySelector('h1')
        title.style.color = '#9E7A7A'

        //找出所有[box-id]屬性的格子，所以用querySelectorAll
        let bricks = document.querySelectorAll('[box-id]')
        //抓出按鈕
        const startBtn = document.querySelector('button')
        //控制速度的變數
        let speed = 80 //速率  預設80，值越大表是速率越慢
        //抓到template
        //let cardTemplate = document.querySelector("#mm")

        //抓出p
        //const msgShow = document.querySelector('p')

        //window onload
        window.onload = function () {

            console.log(bricks) //會跑出NodeList
            //排序格子，要把NodeList先變成Array
            bricks = Array.from(bricks).sort((a, b) => {
                return a.getAttributeNode('box-id').value - b.getAttributeNode('box-id').value
            })
            console.log("排序後")
            console.log(bricks)

            //針對每個格子去塞font awesome的圖示
            bricks.forEach((box) => {
                let id = box.getAttributeNode('box-id').value
                //找對應到的資料是哪一筆(brickData)，面的id要==brickData的id
                let data = brickData.find(x => x.id == id)

                let i = document.createElement('i')
                i.setAttribute('class', data.icon)
                i.style.color = data.color
                box.appendChild(i)
            })

            //按下button的時候要做甚麼事情
            startBtn.onclick = function () {
                speed = 80
                //一按下start就要產出一個亂數，至少要走一步，所以要+1
                let random = Math.floor(Math.random() * brickData.length) + 1
                console.log(random)

                steps = random + (2 * bricks.length)//多轉2圈再停
                //console.log(steps)
                allsteps = steps // 總步數等於steps
                getDiscount() //走的方法
                reset()
            }

            //function

            function reset(){
                p.innerText = ""
                bricks[currentIndex].classList.remove('active')
            }

            function getDiscount() {
                //移除目前走到的格子的樣式
                bricks[currentIndex].classList.remove('active')
                //移除後往前走一步
                currentIndex++

                //判斷目前的currentIndex有沒有超過格子都總長度(不可超過20格)
                //如果超過就要把currentIndex歸0，重頭開始走
                if (currentIndex >= bricks.length) {
                    currentIndex = 0
                }

                //目前走到的格子要加上active的樣式(紅色框框)steps--
                bricks[currentIndex].classList.add('active')
                //之後的步數要-1
                steps--

                //接下來要判斷是不是已經走完了，如果剩餘的步數 > 0，表示還沒有走完
                if (steps > 0) {
                    //還沒走完，就要繼續走，再呼叫一次自己
                    //setTimeout遞2個參數是速率，在自己的function再呼叫自己，是遞迴寫法
                    setTimeout(getDiscount, speed)
                    //變速 先增後減
                    //if (steps > Math.floor((allsteps / 3))) speed -= 7
                    if (steps < Math.floor((allsteps / 3))) speed += 7
                }
                else {
